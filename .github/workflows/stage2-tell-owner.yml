name: Stage 2 — Tell the Owner

on:
  workflow_dispatch:
    inputs:
      endpoint_key:
        description: "Endpoint key (host|method|path)"
        required: true
      f1_score:
        description: "F1 score of classification model"
        required: true
      confidence:
        description: "Classification confidence"
        required: true
      explanation:
        description: "SHAP explanation text"
        required: true
      owner_team:
        description: "Owner team name from Backstage"
        required: true

jobs:
  open-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate with OPA
        id: opa_check
        run: |
          python -c "
          import json, requests
          decision = requests.post(
            '$OPA_URL/v1/data/zombie/decommission',
            json={
              'input': {
                'endpoint_key': '${{ inputs.endpoint_key }}',
                'f1_score': ${{ inputs.f1_score }},
                'is_100pct_synthetic': true,
                'ensemble_disagreement': 0.1,
                'timestamp': '$(date -u +%Y-%m-%dT%H:%M:%SZ)'
              }
            }
          ).json()
          with open('policy_result.json', 'w') as f:
            json.dump(decision.get('result', {}), f)
          print('Policy result:', json.dumps(decision.get('result', {})))
          "
        env:
          OPA_URL: ${{ vars.OPA_URL }}

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const { endpoint_key, f1_score, confidence, explanation, owner_team } = context.payload.inputs;
            const body = `
            ## Zombie API Candidate

            **Endpoint:** \`${endpoint_key}\`
            **Model F1:** ${f1_score}
            **Confidence:** ${confidence}
            **Owner Team:** ${owner_team}

            ### SHAP Explanation
            ${explanation}

            ### Policy Evaluation
            See attached policy_result.json

            ### Response Required (30 days)
            - [ ] **Confirm** — This is a zombie, proceed with decommission
            - [ ] **Dispute** — This endpoint is still needed (provide evidence)
            - [ ] **Request Exemption** — Business justification for keeping

            > Issue auto-generated by Zombie Platform Stage 2
            > Deadline: ${new Date(Date.now() + 30*86400000).toISOString().split('T')[0]}
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ZOMBIE] ${endpoint_key}`,
              body: body,
              labels: ['zombie-candidate', 'needs-response'],
              assignees: [],
            });

      - name: Upload policy result
        uses: actions/upload-artifact@v4
        with:
          name: policy-result-${{ github.run_id }}
          path: policy_result.json
