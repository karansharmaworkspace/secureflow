apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: feature-computation-job
  namespace: listen
spec:
  image: zombie-platform/flink-feature-job:latest
  flinkVersion: v1_19
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "4"
    parallelism.default: "4"
    jobmanager.memory.process.size: "2048m"
    taskmanager.memory.process.size: "4096m"
    state.checkpoints.dir: file:///opt/flink/checkpoints
    state.savepoints.dir: file:///opt/flink/savepoints
    execution.checkpointing.interval: 60s
    execution.checkpointing.exactly-once: "true"
    execution.checkpointing.min-pause: 30s
    execution.checkpointing.tolerable-failed-checkpoints: "3"
  serviceAccount: flink-sa
  jobManager:
    resource:
      memory: "2048m"
      cpu: 1
    replicas: 1
  taskManager:
    resource:
      memory: "4096m"
      cpu: 2
    replicas: 2
  podTemplate:
    spec:
      containers:
      - name: flink-main-container
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: kafka-cluster-kafka-bootstrap.listen.svc:9092
        - name: KAFKA_RAW_TOPIC
          value: raw-api-calls
        - name: KAFKA_OUTPUT_TOPIC
          value: enriched-features
