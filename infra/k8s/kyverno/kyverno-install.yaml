apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: kyverno
  namespace: kyverno
spec:
  repo: https://kyverno.github.io/kyverno/
  chart: kyverno
  version: 3.2.4
  targetNamespace: kyverno
  valuesContent: |-
    admissionController:
      replicas: 2
      serviceMonitor:
        enabled: false
    backgroundController:
      enabled: true
    cleanupController:
      enabled: true
    reportsController:
      enabled: true
    config:
      resourceFilters:
        - "[Event,*,*]"
        - "[*,kyverno,*]"
        - "[*,kube-system,*]"
        - "[*,kube-public,*]"
        - "[*,kube-node-lease,*]"
