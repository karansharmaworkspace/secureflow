apiVersion: v1
kind: ServiceAccount
metadata:
  name: zeek-sa
  namespace: listen
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-sa
  namespace: listen
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zeek-role
  namespace: listen
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["kafka.strimzi.io"]
  resources: ["kafkatopics"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zeek-role-binding
  namespace: listen
subjects:
- kind: ServiceAccount
  name: zeek-sa
  namespace: listen
roleRef:
  kind: Role
  name: zeek-role
  apiGroup: rbac.authorization.k8s.io
